openapi: "3.0.1"
info:
  title: Monty API
  description: >-
    This API contains CRUD methods to manage knights in a kingdom.
    To use this API, you must register a free account at
    https://monty.cloud.example.com/account.
  version: "1.0"
servers:
- url: https://monty.cloud.example.com/rest/v1
tags:
- name: Knights
  description: Manage knights
paths:
  /{kingdomId}/knights:
    get:
      tags:
      - Knights
      summary: >-
        Gets the list of all existing knights in a kingdom.
        The response does not include the previously deleted knights.
        This is the 'index' route of the API. 
      operationId: knightsIndex
      parameters:
      - $ref: '#/components/parameters/kingdomIdInPath'
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestListOfKnights'
    post:
      tags:
      - Knights
      summary: >-
        Creates a knight with the specified parameters.
        This is the 'create' route of the API.
      operationId: knightsCreate
      parameters:
      - $ref: '#/components/parameters/kingdomIdInPath'
      requestBody:
        $ref: '#/components/requestBodies/createKnight'
      responses:
        201:
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestKnight'
  /{kingdomId}/knights/{knightId}:
    get:
      tags:
      - Knights
      summary: >-
        Gets the details of the specified knight.
        This is the 'show' route of the API.
      operationId: knightsShow
      parameters:
      - $ref: '#/components/parameters/kingdomIdInPath'
      - $ref: '#/components/parameters/knightIdInPath'
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestKnight'
    put:
      tags:
      - Knights
      summary: >-
        Updates the specified knight.
        This is the 'update' route of the API.
      operationId: knightsUpdate
      parameters:
      - $ref: '#/components/parameters/kingdomIdInPath'
      - $ref: '#/components/parameters/knightIdInPath'
      requestBody:
        $ref: '#/components/requestBodies/editKnight'
      responses:
        202:
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestKnight'
    delete:
      tags:
      - Knights
      summary: >-
        Deletes the specified knight.
        This is the 'delete' route of the API.
      operationId: knightsDelete
      parameters:
      - $ref: '#/components/parameters/kingdomIdInPath'
      - $ref: '#/components/parameters/knightIdInPath'
      responses:
        204:
          description: No Content
          content:
            application/json:
              schema:
                type: string
              example: {}
components:
  schemas:
    RestListOfKnights:
      type: array
      items:
        $ref: '#/components/schemas/RestKnight'
    RestKnight:
      type: object
      properties:
        id:
          type: string
          description: >-
            A globally unique identifier consisting of Latin characters, digits, and hyphens.
            The ID is created automatically when a knight is created.
            The ID cannot be created or changed manually.
          format: uuid
          example: b8b71701-4811-46c3-a0d6-cc7827cef1fd
        name:
          pattern: /(^Sir|^S1r)\s[A-Za-z0-9\s]{1,252}/
          type: string
          description: >-
            The name of the knight.
            The name length should be between 5 and 256 characters long.
            This is not a unique property, so two or more knights can have the same name.
            The name can be changed at any time.
          example: Sir Brunswick
        age:
          maximum: 65 
          minimum: 18
          type: integer
          description: >-
            The knight's age in years.
            The age can be increased at any time, but cannot be decreased.
          format: int32
          example: 20
        favoriteColor:
          type: string
          description: >-
            The favorite color of the knight.
            The color value defines who can be a best friend of the knight:
            * 'RED' allows having best friends with the 'GREEN' color only.
            * 'GREEN' allows having best friends with the 'BLUE' color only.
            * 'BLUE' allows having best friends with the 'RED' color only.
            if the knight's age is 18 or less, his color is considered
            'GREEN' even if the value is not 'GREEN'.
            The color can be set once only, it cannot be changed later.
          enum:
          - RED
          - GREEN
          - BLUE
        bestFriend:
          type: string
          description: >-
            The knight's best friend. It is an empty string by default.
            The value can only be set as an ID of an existing knight;
            there are several constraints, please refer to the
            'favoriteColor' and 'price' parameters.
            The best friend is not obliged to have the knight as his best friend. 
            All the shrubberies of the best friend are copied to the knight's shrubberies
            and stores there even if the best friend is deleted from the kingdom.
            Once the best friend is set, this parameter cannot be changed
            unless the best friend is deleted from the kingdom.
            When the best friend is deleted from the kingdom, the value
            of this parameter automatically becomes an empty string
            and a new best friend can be set.
          format: uuid
          example: 1dae11c2-915a-43b8-9511-11036934728d
        shrubberies:
          type: array
          description: >-
            The knight's shrubberies. Once a knight is created,
            it is automatically assigned one shrubbery with randomized values.
            Every time the 'bestFriend' parameter is set, the shrubberies array
            is extended with the best friend's shrubberies.
            The shrubberies array cannot be extended manually.
          items:
            $ref: '#/components/schemas/RestShrubbery'
    RestShrubbery:
      type: object
      properties:
        height:
          minimum: 0.1
          type: number
          description: >-
            The shrubbery height in meters.
            The height is set once only, it cannot be changed later.
          format: float
          example: 0.5
        radius:
          minimum: 0.1
          type: number
          description: >-
            The shrubbery radius in meters.
            The radius is set once only, it cannot be changed later.
          format: float
          example: 0.9
        volume:
          minimum: 0.1
          type: number
          description: >-
            The shrubbery volume in square meters that is calculated based on the values
            of the 'radius' and 'height' parameters.
            The volume value is rounded down to the nearest decimal.
            The volume cannot be set or changed manually.
          format: float
          example: 0.7
        description:
          pattern: /nice/
          type: string
          description: >-
            An arbitrary, free-form description.
            The description can be changed at any time.
            Once the description is changed, the 'price' parameter is automatically
            recalculated.
          example: nice shrubbery for a brave knight
        price:
          minimum: 1
          type: integer
          description: >-
            The shrubbery price in pound sterling that is a product of the 'volume'
            value and the number of characters in 'description'.
            The price value is rounded down to the nearest integer.
            Values greater than 99 mean that the shrubbery is expensive.
            If the knight has at least one expensive shrubbery, that knight
            cannot be set as anybody's best friend.  
            The price cannot be set or changed manually.
          format: int32
          example: 40
    RestCreateKnight:
      type: object
      properties:
        name:
          $ref: '#/components/schemas/RestKnight/properties/name'
        age:
          $ref: '#/components/schemas/RestKnight/properties/age'
        favoriteColor:
          $ref: '#/components/schemas/RestKnight/properties/favoriteColor'
        bestFriend:
          $ref: '#/components/schemas/RestKnight/properties/bestFriend'
        schrubberies:
          type: array
          items:
            $ref: '#/components/schemas/RestCreateShrubbery'
    RestEditKnight:
      type: object
      properties:
        name:
          $ref: '#/components/schemas/RestKnight/properties/name'
        age:
          $ref: '#/components/schemas/RestKnight/properties/age'
        bestFriend:
          $ref: '#/components/schemas/RestKnight/properties/bestFriend'
        shrubberies:
          type: array
          items:
            $ref: '#/components/schemas/RestEditShrubbery'
    RestCreateShrubbery:
      type: object
      properties:
        height:
          $ref: '#/components/schemas/RestShrubbery/properties/height'
        radius:
          $ref: '#/components/schemas/RestShrubbery/properties/radius'
        description:
          $ref: '#/components/schemas/RestShrubbery/properties/description'
    RestEditShrubbery:
      type: object
      properties:
        description:
          $ref: '#/components/schemas/RestShrubbery/properties/description'
  parameters:
    kingdomIdInPath:
      name: kingdomId
      in: path
      description: >-
        A globally unique identifier consisting of Latin characters, digits, and hyphens.
        When you register an account at https://monty.cloud.example.com/account,
        the API automatically sends you a response containing the 'kingdomID' parameter.
        The kingdom ID cannot be changed.
      required: true
      schema:
        type: string
    knightIdInPath:
      name: knightId
      in: path
      description: A globally unique identifier consisting of Latin characters, digits, and hyphens.
      required: true
      schema:
        $ref: '#/components/schemas/RestKnight/properties/id'
  requestBodies:
    createKnight:
      description: The details of a new knight to create.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RestCreateKnight'
      required: true
    editKnight:
      description: The parameters for the specified knight to update.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RestEditKnight'
      required: true
  securitySchemes:
    api_key: 
      type: http
      scheme: bearer
      bearerFormat: token
security:
  - api_key: []
